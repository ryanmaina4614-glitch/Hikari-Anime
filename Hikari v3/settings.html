<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Hikari Anime</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="brand">
    <img src="logo.png" alt="Hikari Anime logo" class="logo-img">
  </a>
  <div class="nav-links">
    <a href="index.html" data-i18n="nav.home">Home</a>
    <a href="anime.html" data-i18n="nav.anime">Anime 🎬</a>
    <a href="manga.html" data-i18n="nav.manga">Manga 📚</a>
    <a href="favorites.html" data-i18n="nav.favorites">Favorites ⭐</a>
    <a href="login.html" data-i18n="nav.login">Login</a>
    <a href="signup.html" data-i18n="nav.signup">Sign Up</a>
    <a href="settings.html" data-i18n="nav.settings">Settings</a>
  </div>
</nav>

<section class="settings-wrap">
  <div class="settings-card">
    <h2 data-i18n="settings.title">Settings</h2>
    <p class="settings-subtitle" data-i18n="settings.subtitle">Customize your Hikari Anime experience.</p>

    <form id="settingsForm" class="settings-form">
      <label class="settings-toggle">
        <input type="checkbox" id="settingLearningMode">
        <span data-i18n="settings.learningMode">Enable Learning Mode (show Japanese titles)</span>
      </label>

      <label class="settings-toggle">
        <input type="checkbox" id="settingTrailers">
        <span data-i18n="settings.trailers">Show trailer preview on anime cards</span>
      </label>

      <label class="settings-toggle">
        <input type="checkbox" id="settingLightTheme">
        <span data-i18n="settings.lightTheme">Use Light Theme</span>
      </label>

      <label for="settingLanguage" data-i18n="settings.language">App Language</label>
      <select id="settingLanguage" class="settings-select">
        <option value="en" data-i18n="settings.languageEnglish">English</option>
        <option value="ja" data-i18n="settings.languageJapanese">Japanese</option>
        <option value="es" data-i18n="settings.languageSpanish">Spanish</option>
        <option value="fr" data-i18n="settings.languageFrench">French</option>
        <option value="sw" data-i18n="settings.languageSwahili">Swahili</option>
      </select>

      <div class="settings-actions">
        <button type="submit" data-i18n="settings.save">Save Settings</button>
        <button type="button" id="clearFavoritesBtn" data-i18n="settings.clearFavorites">Clear Favorites</button>
        <button type="button" id="logoutBtn" data-i18n="settings.logout">Logout</button>
      </div>
    </form>

    <p id="settingsMessage" class="auth-message"></p>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
